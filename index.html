<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   CFS
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
        }
  </style>
 </head>
 <body class="bg-gray-900 text-white">
  <header class="bg-gray-900">
   <div class="container mx-auto flex justify-between items-center py-4 px-6">
    <div class="flex items-center">
     <img alt="Cleanfin Logo" class="h-10 w-10" src="https://placehold.co/40x40"/>
     <span class="ml-2 text-xl font-bold">
      CFS
     </span>
    </div>
    <nav class="hidden md:flex space-x-6">
     <a class="hover:text-gray-400" href="#">
      HOME
     </a>
     <a class="hover:text-gray-400" href="#">
      PAGES
      <i class="fas fa-chevron-down">
      </i>
     </a>
     <a class="hover:text-gray-400" href="#">
      SERVICES
      <i class="fas fa-chevron-down">
      </i>
     </a>
     <a class="hover:text-gray-400" href="#">
      PROJECT
      <i class="fas fa-chevron-down">
      </i>
     </a>
     <a class="hover:text-gray-400" href="#">
      BLOG
      <i class="fas fa-chevron-down">
      </i>
     </a>
     <a class="hover:text-gray-400" href="#">
      CONTACT US
     </a>
    </nav>
    <div class="flex items-center space-x-4">
     <i class="fas fa-search text-xl">
     </i>
     <button class="bg-white text-gray-900 px-4 py-2 rounded-full">
      GET IN TOUCH
      <i class="fas fa-arrow-right">
      </i>
     </button>
    </div>
   </div>
  </header>
  <main class="relative">
   <img alt="Man holding a phone and a credit card" class="w-full h-screen object-cover opacity-50" src="https://placehold.co/1920x1080"/>
   <div class="absolute inset-0 flex flex-col justify-center items-start px-6 md:px-20">
    <div class="bg-gray-800 bg-opacity-50 p-2 rounded-full mb-4">
     <span class="text-sm">
      PLAN FOR SECURE FUTURE
     </span>
    </div>
    <h1 class="text-6xl md:text-8xl font-bold leading-tight">
     LEADING
    </h1>
    <h1 class="text-6xl md:text-8xl font-bold leading-tight">
     FINANCIAL.
    </h1>
    <div class="flex items-center mt-6">
     <button class="bg-white text-gray-900 px-6 py-3 rounded-full mr-4">
      CONTACT US
      <i class="fas fa-arrow-right">
      </i>
     </button>
     <span class="text-sm">
      True relationships developing the futures.
     </span>
    </div>
   </div>
  </main>
 </body>
</html>
